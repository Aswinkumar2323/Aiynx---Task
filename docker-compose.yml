version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: user-age-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: user-age-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgrespassword@db:5432/userdb?sslmode=disable
      PORT: 3000
    depends_on:
      - db

volumes:
  postgres_data:
